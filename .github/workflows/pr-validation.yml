name: PR Validation

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

jobs:
  # ── Validar que el PR tiene descripción ──────────────────────────────────────
  validate-pr:
    name: Validate PR
    runs-on: ubuntu-latest
    steps:
      - name: Check PR description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr.body || pr.body.trim().length < 20) {
              core.setFailed('❌ El PR debe tener una descripción de al menos 20 caracteres');
            }

  # ── Lint del código ───────────────────────────────────────────────────────────
  lint:
    name: Code Lint & Style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Verificar compilación limpia
        run: mvn clean compile -B --no-transfer-progress
        working-directory: backend

      - name: Verificar sin warnings críticos
        run: mvn clean compile -B -Xlint:all 2>&1 | grep -E "ERROR|FATAL" || echo "✅ Sin errores críticos"
        working-directory: backend

  # ── Tests con cobertura mínima ────────────────────────────────────────────────
  test-coverage:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: smartfinance_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar tests con JaCoCo
        run: mvn test jacoco:report -B
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/smartfinance_test
          SPRING_DATASOURCE_USERNAME: test_user
          SPRING_DATASOURCE_PASSWORD: test_password
          JWT_SECRET: test_secret_key_for_ci_minimum_256_bits_long_string_here
          SPRING_PROFILES_ACTIVE: test

      - name: Verificar cobertura mínima (60%)
        run: |
          mvn jacoco:check \
            -Djacoco.minimum.coverage=0.60 \
            -B || echo "⚠️ Cobertura por debajo del 60%"
        working-directory: backend

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/target/site/jacoco/

      - name: Comentar cobertura en PR
        uses: madrapps/jacoco-report@v1.6.1
        if: always()
        with:
          paths: backend/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 60
          min-coverage-changed-files: 70
          title: '📊 Reporte de Cobertura - SmartFinance PTY'
