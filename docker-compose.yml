version: '3.8'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smartfinance_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartfinance_db}
      POSTGRES_USER: ${POSTGRES_USER:-smartfinance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartfinance123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-smartfinance} -d ${POSTGRES_DB:-smartfinance_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartfinance_network

  # ── Redis (caché) ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smartfinance_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--pass', '${REDIS_PASSWORD:-redis123}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartfinance_network

  # ── Backend Spring Boot ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartfinance_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-smartfinance_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-smartfinance}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-smartfinance123}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    ports:
      - '8080:8080'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8080/actuator/health || exit 1']
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - smartfinance_network
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.backend.rule=Host(`api.smartfinance.com`)'

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  smartfinance_network:
    driver: bridge
