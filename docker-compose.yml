version: '3.8'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smartfinance_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartfinance_db}
      POSTGRES_USER: ${POSTGRES_USER:-smartfinance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartfinance123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-smartfinance} -d ${POSTGRES_DB:-smartfinance_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartfinance_network

  # ── Redis (caché) ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smartfinance_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--pass', '${REDIS_PASSWORD:-redis123}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartfinance_network

  # ── Backend Spring Boot ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartfinance_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-smartfinance_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-smartfinance}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-smartfinance123}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - '8080:8080'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8080/actuator/health || exit 1']
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - smartfinance_network
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.backend.rule=Host(`api.smartfinance.com`)'
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: smartfinance_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - smartfinance_network
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: smartfinance_kafka
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - smartfinance_network
    healthcheck:
      test: ['CMD', 'kafka-topics', '--bootstrap-server', 'localhost:9092', '--list']
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  smartfinance_network:
    driver: bridge
