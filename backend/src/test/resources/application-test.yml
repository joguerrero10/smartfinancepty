spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false

  flyway:
    enabled: false

  graphql:
    graphiql:
      enabled: false

application:
  security:
    jwt:
      secret-key: dGVzdFNlY3JldEtleUZvckpVbml0VGVzdHMyNTZiaXRz
      expiration: 86400000
      refresh-token:
        expiration: 604800000

logging:
  level:
    root: WARN
    com.smartfinancepty: DEBUG
