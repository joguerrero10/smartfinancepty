spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartfinance_test}
    username: ${SPRING_DATASOURCE_USERNAME:test_user}
    password: ${SPRING_DATASOURCE_PASSWORD:test_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop # Crea y elimina el schema en cada test
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-on-validation-error: true

  graphql:
    graphiql:
      enabled: false

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:test_secret_key_for_ci_minimum_256_bits_long_string_here}
      expiration: 86400000
      refresh-token:
        expiration: 604800000

logging:
  level:
    root: WARN
    com.smartfinancepty: DEBUG
