spring:
  application:
    name: finance
  servlet:
    multipart:
      enabled: true
      max-file-size: 8MB
      max-request-size: 8MB
  datasource:
    url: "jdbc:postgresql://localhost:5432/smartfinance_db"
    username: "${DB_USERNAME:root}"
    password: "${DB_PASSWORD:root}"
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: "classpath:db/migration"
    baseline-on-migrate: true
  graphql:
    path: /graphql
    graphiql:
      enabled: true
    schema:
      locations: "classpath:graphql/"
      file-extensions: .graphqls
  kafka:
    bootstrap-servers: "${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false
    consumer:
      group-id: smartfinance-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "com.smartfinancepty.finance.*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: "java.util.Map"

application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000
      refresh-token:
        expiration: 604800000

app:
  upload:
    max-size-mb: 10
  storage:
    local:
      path: uploads
      base-url: "http://localhost:8080/files"
  ocr:
    tessdata-path: /usr/share/tesseract-ocr/5/tessdata
    language: spa+eng
    dpi: 300
  security:
    cors:
      allowed-origins: "http://localhost:4200,http://localhost:8100,http://localhost:3000,capacitor://localhost,ionic://localhost"
      allowed-methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
      max-age: 3600
    rate-limit:
      enabled: true
      requests-per-minute: 60
      auth-requests-per-minute: 10

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
    filter: true
    try-it-out-enabled: true
    default-models-expand-depth: 1
  show-actuator: false

server:
  port: 8080
